<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- blank paper feeding in at the top -->
  <rect x="16" y="5" width="32" height="16" rx="2" fill="#dfe5ee"/>

  <!-- printed map sheet emerging below -->
  <rect x="16" y="30" width="32" height="29" rx="2" fill="#ffffff"/>
  <clipPath id="sheet">
    <rect x="16" y="30" width="32" height="29" rx="2"/>
  </clipPath>
  <g clip-path="url(#sheet)">
    <rect x="16" y="30" width="15" height="13" fill="#b7dfb9"/>
    <path d="M16 53 Q26 47 34 51 T50 47" stroke="#7ab8f5" stroke-width="4.5" fill="none"/>
    <path d="M24 30 V59 M16 43 H48 M35 30 L48 51" stroke="#e8720c" stroke-width="2.5" fill="none"/>
  </g>

  <!-- printer body over both sheets -->
  <rect x="6" y="14" width="52" height="20" rx="4" fill="#2a3340"/>
  <rect x="12" y="31" width="40" height="4" rx="2" fill="#0e1218"/>
  <circle cx="50" cy="22" r="3" fill="#e8720c"/>
</svg>
